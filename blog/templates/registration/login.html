{% extends 'blog/base.html' %}

{% block content %}
<div class="row">
    <div class="col-md-6 offset-md-3">
        <div class="bg-white p-4 rounded shadow-sm">
            <h2 class="mb-4">Вход на сайт</h2>
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="{{ form.username.id_for_label }}" class="form-label">Имя пользователя</label>
                    {{ form.username }}
                </div>
                <div class="mb-3">
                    <label for="{{ form.password.id_for_label }}" class="form-label">Пароль</label>
                    {{ form.password }}
                </div>
                <div class="mt-4 d-grid">
                    <button type="submit" class="btn btn-success">Войти</button>
                </div>
                <div class="mt-3 text-center">
                    <small class="text-muted">
                        Еще нет аккаунта? <a href="{% url 'register' %}">Зарегистрироваться</a>
                    </small>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
